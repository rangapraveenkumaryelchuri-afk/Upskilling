
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">Community Portal</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#events">Events</a></li>
                <li class="nav-item"><a class="nav-link" href="#gallery">Gallery</a></li>
                <li class="nav-item"><a class="nav-link" href="#register">Register</a></li>
                <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main -->
<main>

<section id="home" class="hero">
    <div class="container">
        <div id="welcomeBanner">
            <h1 class="text-danger">Welcome to the Local Community Event Portal</h1>
            <p class="highlight">
                Special Offer:
                <span style="color:red;font-weight:bold;">
                    Register today and get free entry coupons!
                </span>
            </p>
        </div>
    </div>
</section>

<section id="events" class="container py-5">
    <h2 class="section-title">Upcoming Events</h2>

    <div class="row" id="eventContainer"></div>
</section>

<section id="gallery" class="container py-5">
    <h2 class="section-title">Event Gallery</h2>

    <table class="table table-bordered text-center">
        <tr>
            <td><img src="https://picsum.photos/200?1" class="gallery-img" alt="Event 1" title="Event 1"></td>
            <td><img src="https://picsum.photos/200?2" class="gallery-img" alt="Event 2" title="Event 2"></td>
            <td><img src="https://picsum.photos/200?3" class="gallery-img" alt="Event 3" title="Event 3"></td>
        </tr>

        <tr>
            <td><img src="https://picsum.photos/200?4" class="gallery-img" alt="Event 4" title="Event 4"></td>
            <td><img src="https://picsum.photos/200?5" class="gallery-img" alt="Event 5" title="Event 5"></td>
            <td><img src="https://picsum.photos/200?6" class="gallery-img" alt="Event 6" title="Event 6"></td>
        </tr>
    </table>
</section>

<section id="register" class="container py-5">
    <h2 class="section-title">Event Registration</h2>

    <form id="registrationForm">
        <div class="mb-3">
            <input type="text" class="form-control" name="name" placeholder="Enter Name" required autofocus>
        </div>

        <div class="mb-3">
            <input type="email" class="form-control" name="email" placeholder="Enter Email" required>
        </div>

        <div class="mb-3">
            <input type="date" class="form-control" required>
        </div>

        <div class="mb-3">
            <select class="form-select" id="eventType">
                <option value="">Select Event</option>
                <option value="Music">Music</option>
                <option value="Workshop">Workshop</option>
                <option value="Sports">Sports</option>
            </select>
        </div>

        <div class="mb-3">
            <textarea class="form-control" id="feedback" placeholder="Message"></textarea>
            <small>Characters: <span id="charCount">0</span></small>
        </div>

        <button class="btn btn-primary" id="registerBtn">Register</button>

        <button type="button" class="btn btn-danger" onclick="clearPreferences()">
            Clear Preferences
        </button>

        <output id="outputMessage"></output>
    </form>
</section>

<section class="container py-5">
    <h2 class="section-title">Promo Video</h2>

    <video width="100%" controls oncanplay="videoReady()">
        <source src="C:\Users\prave\OneDrive\Desktop\LocalCommunityPortal\6960615-uhd_2728_1440_24fps.mp4" type="video/mp4">
    </video>

    <p id="videoMessage"></p>
</section>

<section class="container py-5">
    <button class="btn btn-success" onclick="findNearbyEvents()">
        Find Nearby Events
    </button>

    <p id="locationOutput"></p>
</section>

</main>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3">
    <p>© 2026 Local Community Portal</p>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
